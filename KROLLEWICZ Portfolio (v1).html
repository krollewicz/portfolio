<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KROLLEWICZ — Graphic Portfolio</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="mask-icon" href="favicon.svg" color="#0c0c0b" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  @property --sc { syntax: '<number>'; inherits: true; initial-value: 0; }
  @property --hp { syntax: '<number>'; inherits: true; initial-value: 0; }
  @property --dock { syntax: '<number>'; inherits: true; initial-value: 0; }
  :root {
    --bg: #f4f4f2;
    --panel: #fafafa;
    --panel-2: #efefec;
    --line: #dcdcd6;
    --line-soft: #e8e8e3;
    --rule-strong: #141413;
    --fg: #141413;
    --muted: #74746d;
    --muted-2: #abaaa2;
    --accent: #141413;        /* mono by default; tweakable */
    --accent-ink: #fafafa;    /* text color on accent fills */
    --grotesk: 'Space Grotesk', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --nav-w: 250px;
    --content-w: 444px;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; overflow-x: clip; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--grotesk);
    -webkit-font-smoothing: antialiased;
  }

  ::selection { background: var(--accent); color: var(--accent-ink); }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #cfcfc8; }

  .mono {
    font-family: var(--mono);
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  #root { min-height: 100vh; }

  .logo {
    font-family: 'Manrope', system-ui, sans-serif;
    font-weight: 800;
    letter-spacing: -0.01em;
    line-height: 0.9;
    color: var(--fg);
    text-transform: uppercase;
    white-space: nowrap;
    font-size: 30px;
  }
  .logo .logo-accent { transition: color 0.16s linear; }

  /* ===================================================== */
  /* HEADER — top utility bar (brand + lang/social), right-aligned */
  /* ===================================================== */
  .header {
    position: fixed; top: 10px; left: 10px; right: 10px; z-index: 100;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 clamp(18px, 3vw, 38px) 0 clamp(20px, 4.5vw, 54px);
    background: rgba(231,229,219, calc(var(--dock,0) * 0.92));
    -webkit-backdrop-filter: blur(calc(var(--dock,0) * 11px));
            backdrop-filter: blur(calc(var(--dock,0) * 11px));
    border-bottom: 1px solid rgba(20,20,19, calc(var(--dock,0) * 0.10));
  }
  .header-left { display: flex; align-items: center; opacity: calc(1 - var(--dock,0)); }
  .header-left { pointer-events: auto; }
  .header-right { display: flex; align-items: center; gap: clamp(16px, 2.2vw, 30px); }
  /* docked logo is now the hero wordmark itself (see .home-mark) */
  .hbrand { display: none; }
  .hbrand .logo { font-family: 'Hanken Grotesk', system-ui, sans-serif; font-weight: 700; text-transform: lowercase; font-size: 24px; line-height: 0.82; letter-spacing: -0.035em; color: var(--fg); }
  .hbrand .logo .logo-accent { color: var(--accent); }
  .hbrand .hsub { font-family: 'Hanken Grotesk', system-ui, sans-serif; font-weight: 500; text-transform: lowercase; font-size: 13px; letter-spacing: 0.01em; color: var(--fg); margin-bottom: 2px; }
  .hbrand .hsub .dot { color: var(--accent); }

  /* floating nav: parks bottom-left on hero, then SNAPS up to the top bar
     (pure vertical travel + threshold class toggle = no diagonal pixel-crawl) */
  .floatnav {
    position: fixed; z-index: 101;
    left: clamp(20px, 4.5vw, 54px);
    top: clamp(26px, 4.4vh, 34px);
    --dock-x: 236px;
    display: flex; align-items: center; gap: clamp(16px, 2vw, 30px);
    transform: translate(var(--dock-x), calc(100vh - 150px));
    color: #ffffff;
    transition: transform 0.6s var(--ease), color 0.4s ease;
    will-change: transform;
  }
  .floatnav.docked {
    transform: translate(var(--dock-x), 0);
    color: var(--fg);
  }
  .hnav-item {
    position: relative; background: none; border: none; cursor: pointer;
    font-family: var(--grotesk); font-weight: 600; text-transform: uppercase;
    font-size: 13px; letter-spacing: 0.1em;
    color: inherit; padding: 6px 0;
    text-shadow: 0 1px 16px rgba(0,0,0,0.45);
    transition: opacity 0.25s ease, text-shadow 0.4s ease;
  }
  .floatnav.docked .hnav-item { text-shadow: none; }
  .hnav-item::after {
    content: ''; position: absolute; left: 0; bottom: 1px; height: 1px; width: 100%;
    background: currentColor; transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s var(--ease);
  }
  .hnav-item:hover::after { transform: scaleX(1); }
  .hnav-item.active::after { transform: scaleX(1); }
  .hnav-item .rn-no { font-family: var(--mono); font-size: 9px; color: var(--muted-2); margin-right: 6px; }

  .hsocial { display: flex; gap: 14px; }
  .hsocial a { color: var(--muted); display: inline-flex; transition: color 0.2s ease, transform 0.3s var(--ease); }
  .hsocial a:hover { color: var(--fg); transform: translateY(-2px); }
  .hlang { display: inline-flex; align-items: center; gap: 9px; }
  .hlang button { background: none; border: none; cursor: pointer; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--muted-2); transition: color 0.2s ease; }
  .hlang button.on { color: var(--fg); }
  .hlang .sep { width: 1px; height: 11px; background: rgba(20,20,19,0.2); }

  .hmenu-btn { display: none; }

  /* ===================================================== */
  /* SCROLL-DRIVEN ENGINE (modern, jank-free)              */
  /* --dock  : 0 on hero -> 1 once portfolio docks at top  */
  /* --hp    : hero plate retract / video reveal           */
  /* ===================================================== */
  /* --dock / --hp are driven by JS (see scroll handler) for reliability across
     browsers; the previous CSS scroll-timeline binding proved fragile. */
  @keyframes dockProg { from { --dock: 0; } to { --dock: 1; } }
  @keyframes heroRetract { from { --hp: 0; } to { --hp: 1; } }

  /* 10px black frame around the whole viewport */
  .frame-border { position: fixed; inset: 0; border: 10px solid #0c0c0b; z-index: 200; pointer-events: none; }

  /* ===================================================== */
  /* HOME — pinned reveal: white plate + logo retracts up to     */
  /* expose the full-screen video, then normal scroll continues   */
  /* ===================================================== */
  .home {
    position: sticky; top: 0;
    height: 100vh; min-height: 600px;
    z-index: 1;
    overflow: hidden;
    background: #0a0a0a;
  }
  .reveal-spacer { position: relative; z-index: 1; height: 95vh; }

  /* full-screen video behind the plate */
  .home-video-band { position: absolute; inset: 0; z-index: 1; overflow: hidden; }
  .home-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transform: translate(calc(var(--px,0) * -10px), calc(var(--py,0) * -8px)) scale(calc(1.06 + var(--hp,0) * 0.12));
    transition: transform 0.3s ease;
  }
  .home-video-fx {
    position: absolute; inset: 0; pointer-events: none; z-index: 2;
    background:
      repeating-linear-gradient(0deg, rgba(231,229,219,0) 0 2px, rgba(231,229,219,0.28) 2px 4px),
      linear-gradient(92deg, rgba(64,200,128,0.18) 0%, rgba(231,229,219,0) 42%, rgba(86,140,255,0.18) 100%);
    mix-blend-mode: screen;
    opacity: calc(1 - var(--hp, 0));
  }
  .home-video-grain {
    position: absolute; inset: 0; pointer-events: none; z-index: 3;
    background: repeating-linear-gradient(0deg, rgba(20,20,15,0) 0 3px, rgba(20,20,15,0.06) 3px 4px);
    mix-blend-mode: multiply;
    opacity: calc(1 - var(--hp, 0) * 0.85);
  }

  /* white plate carrying the wordmark, slides up to reveal video */
  .home-plate {
    position: absolute; left: 0; right: 0; top: 0; z-index: 4;
    height: calc(56vh - var(--hp, 0) * (56vh - 84px));
    background: #e7e5db;
    -webkit-mask-image: linear-gradient(180deg, #000 calc(100% - 7vh), transparent 100%);
            mask-image: linear-gradient(180deg, #000 calc(100% - 7vh), transparent 100%);
  }
  /* the hero wordmark IS the logo: it shrinks + rises into the docked header slot.
     Driven by --dock so it lands exactly where the top-bar logo lives. */
  .home-mark {
    position: fixed; z-index: 102;
    left: clamp(20px, 4.5vw, 54px);
    top: clamp(26px, 4.4vh, 34px);
    display: flex; align-items: flex-end;
    gap: calc(9px + (1 - var(--dock,0)) * 16px);
    transform: translateY(calc((1 - var(--dock,0)) * 27vh));
    transform-origin: left top;
    cursor: pointer;
  }
  .home-name {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    font-weight: 700; text-transform: lowercase;
    font-size: calc(24px + (1 - var(--dock,0)) * (clamp(52px, 12vw, 188px) - 24px));
    line-height: 0.84; letter-spacing: -0.035em;
    color: #16160f;
    text-shadow: 0 2px 34px rgba(0,0,0, calc((1 - var(--dock,0)) * var(--dock,0) * 1.6));
  }
  .home-sub {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    font-weight: 500; text-transform: lowercase;
    font-size: calc(13px + (1 - var(--dock,0)) * (clamp(15px, 1.7vw, 26px) - 13px));
    letter-spacing: 0.01em; color: #16160f;
    margin-bottom: calc(2px + (1 - var(--dock,0)) * (clamp(8px, 1.6vw, 22px) - 2px));
    white-space: nowrap;
  }
  .home-sub .dot { color: var(--accent); }

  .home-scroll {
    position: absolute; right: clamp(20px, 4.5vw, 70px); bottom: 24px; z-index: 5;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: #fff; mix-blend-mode: difference;
    opacity: calc(1 - var(--hp, 0) * 1.4);
  }
  .home-scroll .line { width: 1px; height: 36px; background: rgba(255,255,255,0.6); position: relative; overflow: hidden; }
  .home-scroll .line::after { content: ''; position: absolute; left: 0; top: -50%; width: 100%; height: 50%; background: #fff; animation: scrolldot 1.8s ease-in-out infinite; }
  @keyframes scrolldot { 0% { top: -50%; } 100% { top: 100%; } }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  .curtain { position: relative; z-index: 10; background: var(--bg); }

  /* ===================================================== */
  /* SECTIONS                                              */
  /* ===================================================== */
  section.block {
    position: relative;
    padding: clamp(60px, 7vw, 110px) clamp(28px, 4vw, 64px);
  }
  .sec-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: clamp(32px, 4vw, 56px); flex-wrap: wrap; }
  .sec-kicker { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; color: var(--muted); display: flex; align-items: center; gap: 12px; }
  .sec-kicker::before { content: ''; width: 28px; height: 1px; background: var(--accent); display: inline-block; }
  .sec-title {
    font-family: 'Manrope', system-ui, sans-serif;
    font-weight: 800; text-transform: uppercase;
    font-size: clamp(38px, 7vw, 104px); line-height: 0.92; letter-spacing: -0.02em;
  }
  .sec-num { font-family: var(--mono); font-size: 11px; color: var(--muted-2); letter-spacing: 0.16em; }

  /* PORTFOLIO — masonry of project tiles, auto-synced from manifest */
  .pf-block { position: relative; }
  .pf-block .sec-head { align-items: flex-end; }

  /* live auto-sync status pill */
  .sync-pill {
    display: inline-flex; align-items: center; gap: 11px;
    padding: 9px 15px; border: 1px solid var(--line);
    background: var(--panel); border-radius: 999px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--muted);
    white-space: nowrap;
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: oklch(0.72 0.17 150); position: relative; flex: none; }
  .sync-dot::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 1px solid oklch(0.72 0.17 150); opacity: 0; animation: syncPing 2s var(--ease) infinite; }
  @keyframes syncPing { 0% { transform: scale(0.7); opacity: 0.7; } 80%,100% { transform: scale(1.9); opacity: 0; } }
  .sync-pill.checking .sync-dot { background: oklch(0.78 0.16 90); }
  .sync-pill.checking .sync-dot::after { border-color: oklch(0.78 0.16 90); }
  .sync-pill.offline .sync-dot { background: var(--muted-2); }
  .sync-pill.offline .sync-dot::after { animation: none; }
  .sync-label { color: var(--fg); font-weight: 500; }
  .sync-sep { width: 1px; height: 11px; background: var(--line); }
  .sync-count { color: var(--muted); }
  .sync-time { color: var(--muted-2); }

  /* masonry grid (CSS columns — grows gracefully as projects are added) */
  /* full-bleed grid — max 4 across, portrait = 1 cell, landscape/video = 2 cells, uniform height */
  .pfg {
    --pf-h: clamp(300px, 31vw, 440px);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: var(--pf-h);
    grid-auto-flow: row;
    gap: 10px; background: #0c0c0b; padding: 10px;
  }
  .pfg-empty { grid-column: 1 / -1; color: rgba(255,255,255,0.5); padding: 80px 10px; text-align: center; }
  .pfg-card {
    grid-column: span 1;
    display: block; width: 100%; height: 100%; padding: 0; border: none; cursor: pointer;
    position: relative; overflow: hidden; background: #16160f; text-align: left;
    transform-origin: center;
  }
  .pfg-card.wide { grid-column: span 2; }
  .pfg-media { position: absolute; inset: 0; overflow: hidden; z-index: 0; }
  .pfg-media img, .pfg-media video {
    position: absolute; left: 0; top: -6%; width: 100%; height: 112%;
    object-fit: cover; display: block; background: #000;
    transition: transform 0.9s var(--ease), filter 0.6s var(--ease);
    filter: saturate(1.02);
  }
  .pfg-card:hover .pfg-media img, .pfg-card:hover .pfg-media video { transform: scale(1.06); }
  .pfg-play {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 3;
    width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.7); border-radius: 50%;
    color: #fff; font-size: 13px; padding-left: 3px;
    background: rgba(10,10,9,0.25); -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
    pointer-events: none; transition: transform 0.4s var(--ease), background 0.4s var(--ease);
  }
  .pfg-card:hover .pfg-play { transform: translate(-50%,-50%) scale(1.12); background: rgba(10,10,9,0.45); }
  .pfg-ix { position: absolute; top: 13px; left: 13px; z-index: 3; font-size: 10px; letter-spacing: 0.12em; color: #fff; mix-blend-mode: difference; }
  .pfg-grad {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: linear-gradient(to top, rgba(8,8,6,0.85) 0%, rgba(8,8,6,0.32) 34%, rgba(8,8,6,0) 58%);
    opacity: 0.55; transition: opacity 0.5s var(--ease);
  }
  .pfg-card:hover .pfg-grad { opacity: 0.95; }
  .pfg-meta { position: absolute; left: 0; right: 0; bottom: 0; z-index: 2; padding: 16px 16px 15px; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
  .pfg-cat { font-size: 9px; letter-spacing: 0.16em; color: rgba(255,255,255,0.7); }
  .pfg-title { font-family: 'Manrope', system-ui, sans-serif; font-weight: 800; text-transform: uppercase; font-size: clamp(17px, 1.5vw, 23px); line-height: 1.02; letter-spacing: -0.01em; color: #fff; }
  .pfg-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 3px; }
  .pfg-count { font-size: 9px; letter-spacing: 0.12em; color: rgba(255,255,255,0.55); }
  .pfg-open { font-size: 9px; letter-spacing: 0.14em; color: #fff; opacity: 0; transform: translateX(-5px); transition: opacity 0.4s var(--ease), transform 0.4s var(--ease); }
  .pfg-open .ar { display: inline-block; }
  .pfg-card:hover .pfg-open { opacity: 1; transform: none; }
  .pfg-new {
    position: absolute; top: 12px; right: 12px; z-index: 4;
    font-size: 9px; letter-spacing: 0.16em; color: var(--accent-ink);
    background: var(--accent); padding: 4px 8px;
    animation: newPulse 1.5s var(--ease) infinite;
  }
  @keyframes newPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.0); } 50% { box-shadow: 0 0 0 4px rgba(255,255,255,0.18); } }
  /* entrance when a freshly-detected card mounts */
  .pfg-card.is-new { animation: cardDrop 0.7s var(--ease) both; }
  @keyframes cardDrop { from { opacity: 0; transform: translateY(-22px) scale(0.97); } to { opacity: 1; transform: none; } }

  /* closing CTA tile — always last, 1 cell, invites the next collaboration */
  .pfg-cta {
    background: #e7e5db;
    display: flex; flex-direction: column; justify-content: space-between; gap: 14px;
    padding: clamp(18px, 1.5vw, 28px);
  }
  .pfg-cta-kick { font-size: 10px; letter-spacing: 0.16em; color: var(--muted); }
  .pfg-cta-h {
    font-family: 'Manrope', system-ui, sans-serif; font-weight: 800; text-transform: uppercase;
    font-size: clamp(23px, 1.95vw, 36px); line-height: 0.95; letter-spacing: -0.02em;
    color: #141413; text-wrap: balance; margin-top: auto;
  }
  .pfg-cta-foot { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
  .pfg-cta-sub { font-size: 9px; letter-spacing: 0.14em; color: var(--muted); max-width: 15ch; line-height: 1.5; }
  .pfg-cta-arrow {
    flex: none; width: clamp(46px, 4vw, 60px); height: clamp(46px, 4vw, 60px); border-radius: 50%;
    border: 1px solid var(--accent); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.45s var(--ease), background 0.35s var(--ease), color 0.35s var(--ease);
  }
  .pfg-cta:hover { background: #efede5; }
  .pfg-cta:hover .pfg-cta-arrow { background: var(--accent); color: var(--accent-ink); transform: translate(3px, -3px); }
  .pfg-cta:hover .pfg-cta-h { transform: none; }

  /* ===================================================== */
  /* LIGHTBOX — full-size project gallery                  */
  /* ===================================================== */
  .lb {
    position: fixed; inset: 0; z-index: 300;
    display: flex; flex-direction: column;
    background: rgba(10,10,9,0.94); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    animation: lbIn 0.4s var(--ease) both;
  }
  @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }
  .lb-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; padding: clamp(18px, 2.4vw, 34px) clamp(20px, 3vw, 46px) 14px; }
  .lb-id { display: flex; flex-direction: column; gap: 5px; }
  .lb-cat { font-size: 10px; letter-spacing: 0.18em; color: oklch(0.72 0.17 150); }
  .lb-title { font-family: 'Manrope', system-ui, sans-serif; font-weight: 800; text-transform: uppercase; font-size: clamp(20px, 2.4vw, 34px); line-height: 0.98; letter-spacing: -0.02em; color: #fff; }
  .lb-client { font-size: 10px; letter-spacing: 0.12em; color: rgba(255,255,255,0.45); }
  .lb-tools { display: flex; align-items: center; gap: 18px; }
  .lb-counter { font-size: 12px; letter-spacing: 0.14em; color: rgba(255,255,255,0.7); }
  .lb-x { width: 42px; height: 42px; border: 1px solid rgba(255,255,255,0.2); background: none; color: #fff; cursor: pointer; font-size: 16px; border-radius: 50%; transition: background 0.25s ease, transform 0.25s ease; }
  .lb-x:hover { background: rgba(255,255,255,0.12); transform: rotate(90deg); }
  .lb-stage { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; gap: clamp(8px, 2vw, 26px); padding: 0 clamp(12px, 2.5vw, 40px); }
  .lb-nav { flex: none; width: clamp(40px, 4vw, 54px); height: clamp(40px, 4vw, 54px); border: 1px solid rgba(255,255,255,0.22); background: rgba(255,255,255,0.03); color: #fff; cursor: pointer; font-size: 22px; line-height: 1; border-radius: 50%; transition: background 0.25s ease, transform 0.25s ease; }
  .lb-nav:hover { background: rgba(255,255,255,0.14); }
  .lb-nav.prev:hover { transform: translateX(-3px); }
  .lb-nav.next:hover { transform: translateX(3px); }
  .lb-frame { position: relative; flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; cursor: zoom-in; overflow: hidden; }
  .lb-frame img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 30px 80px rgba(0,0,0,0.5); animation: lbImg 0.5s var(--ease) both; }
  .lb-frame video { max-width: 100%; max-height: 100%; background: #000; box-shadow: 0 30px 80px rgba(0,0,0,0.5); animation: lbImg 0.5s var(--ease) both; }
  .lb-frame.is-video { cursor: default; }
  @keyframes lbImg { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: none; } }
  .lb-frame.zoom { cursor: zoom-out; overflow: auto; }
  .lb-frame.zoom img { max-width: none; max-height: none; width: auto; height: auto; }
  .lb-hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 9px; letter-spacing: 0.16em; color: rgba(255,255,255,0.5); pointer-events: none; }
  .lb-strip { flex: none; display: flex; gap: 8px; justify-content: center; padding: 14px clamp(20px, 3vw, 46px) clamp(20px, 2.6vw, 34px); overflow-x: auto; }
  .lb-thumb { flex: none; width: 58px; height: 58px; padding: 0; border: 1px solid rgba(255,255,255,0.15); background: none; cursor: pointer; overflow: hidden; opacity: 0.5; transition: opacity 0.25s ease, border-color 0.25s ease; }
  .lb-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .lb-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; background: #000; }
  .lb-thumb.vid { position: relative; }
  .lb-thumb-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; padding-left: 2px; text-shadow: 0 1px 6px rgba(0,0,0,0.7); pointer-events: none; }
  .lb-thumb:hover { opacity: 0.85; }
  .lb-thumb.on { opacity: 1; border-color: #fff; }

  /* toast — new project detected */
  .toast {
    position: fixed; left: 50%; bottom: 34px; transform: translateX(-50%); z-index: 250;
    display: inline-flex; align-items: center; gap: 12px;
    background: #0c0c0b; color: #fff; padding: 13px 20px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.4);
    animation: toastIn 0.5s var(--ease) both;
  }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 18px); } to { opacity: 1; transform: translateX(-50%); } }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; background: oklch(0.72 0.17 150); animation: syncPing 1.4s var(--ease) infinite; }
  .toast-k { font-size: 9px; letter-spacing: 0.16em; color: rgba(255,255,255,0.55); }
  .toast-v { font-weight: 600; font-size: 14px; }

  /* ===================================================== */
  /* SCROLL-DRIVEN REVEAL EFFECTS (Apple-style)            */
  /* ===================================================== */
  @media (prefers-reduced-motion: no-preference) {
    @supports (animation-timeline: view()) {
      @keyframes cardRise { from { opacity: 0; transform: translateY(46px) scale(0.965); } to { opacity: 1; transform: none; } }
      .pfg-card:not(.is-new) {
        animation: cardRise linear both;
        animation-timeline: view();
        animation-range: entry 2% entry 26%;
      }
      @keyframes mediaPara { from { transform: translateY(-3.5%); } to { transform: translateY(3.5%); } }
      .pfg-media img, .pfg-media video {
        animation: mediaPara linear both;
        animation-timeline: view();
        animation-range: cover 0% cover 100%;
      }
      .pfg-card:hover .pfg-media img, .pfg-card:hover .pfg-media video { animation: none; transform: scale(1.06); }
      @keyframes titleRise { from { opacity: 0; transform: translateY(34px); } to { opacity: 1; transform: none; } }
      .sec-title, .svc-row, .about-photo {
        animation: titleRise linear both;
        animation-timeline: view();
        animation-range: entry 0% entry 32%;
      }
      @keyframes photoScale { from { transform: scale(1.12); } to { transform: scale(1); } }
      .about-photo image-slot {
        animation: photoScale linear both;
        animation-timeline: view();
        animation-range: entry 0% cover 60%;
      }
    }
  }

  /* ABOUT */
  .about-wrap { display: grid; grid-template-columns: 0.64fr 1.36fr; gap: clamp(34px, 5vw, 80px); align-items: center; }
  .about-photo { position: relative; aspect-ratio: 4 / 5; width: 100%; justify-self: start; background: #e7e7e2; overflow: hidden; }
  .about-photo image-slot { width: 100%; height: 100%; display: block; }
  .about-photo image-slot::part(image) { object-position: 50% 16%; }
  .about-copy { display: flex; flex-direction: column; justify-content: center; gap: 30px; }
  .about-bio { font-size: clamp(18px, 1.8vw, 24px); line-height: 1.5; letter-spacing: -0.01em; text-wrap: pretty; max-width: 30ch; }
  .about-bio b { font-weight: 600; }
  .about-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--line); border: 1px solid var(--line); }
  .about-stats .cell { background: var(--bg); padding: 20px 18px; display: flex; flex-direction: column; gap: 7px; }
  .about-stats .cell .k { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; color: var(--muted-2); }
  .about-stats .cell .v { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.2; white-space: pre-line; }

  /* SERVICES list */
  .svc-list { border-top: 1px solid var(--rule-strong); }
  .svc-row {
    display: grid; grid-template-columns: 56px 1fr auto; align-items: center; gap: 24px;
    padding: clamp(20px, 2.6vw, 34px) 8px; border-bottom: 1px solid var(--rule-strong);
    cursor: default; position: relative; overflow: hidden;
    transition: padding-left 0.4s var(--ease), color 0.3s var(--ease);
  }
  .svc-row .svc-no { font-family: var(--mono); font-size: 12px; color: var(--muted-2); letter-spacing: 0.1em; transition: color 0.3s ease; }
  .svc-row .svc-name {
    font-family: 'Manrope', system-ui, sans-serif; font-weight: 800; text-transform: uppercase;
    font-size: clamp(26px, 4vw, 56px); line-height: 0.95; letter-spacing: -0.02em;
    transition: transform 0.4s var(--ease);
  }
  .svc-row .svc-desc { font-size: 13.5px; color: var(--muted); max-width: 30ch; text-align: right; transition: color 0.3s ease; }
  .svc-row::before {
    content: ''; position: absolute; inset: 0; background: var(--accent); z-index: 0;
    transform: scaleY(0); transform-origin: bottom; transition: transform 0.4s var(--ease);
  }
  .svc-row > * { position: relative; z-index: 1; }
  .svc-row:hover::before { transform: scaleY(1); }
  .svc-row:hover { padding-left: 26px; color: var(--accent-ink); }
  .svc-row:hover .svc-no { color: var(--accent-ink); }
  .svc-row:hover .svc-name { transform: translateX(6px); }
  .svc-row:hover .svc-desc { color: var(--accent-ink); }

  /* CONTACT */
  .contact-wrap { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: clamp(30px, 5vw, 80px); align-items: start; }
  .contact-lead { font-size: clamp(20px, 2.2vw, 30px); line-height: 1.4; letter-spacing: -0.01em; text-wrap: pretty; }
  .contact-meta { margin-top: 34px; display: flex; flex-direction: column; gap: 16px; }
  .contact-meta a { color: var(--fg); text-decoration: none; font-size: 16px; font-weight: 500; display: inline-flex; align-items: center; gap: 10px; width: max-content; }
  .contact-meta a .k { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; color: var(--muted-2); }
  .contact-meta a:hover { color: var(--accent); }
  .form { display: flex; flex-direction: column; gap: 26px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; }
  .field input, .field textarea {
    background: transparent; border: none; border-bottom: 1px solid var(--rule-strong);
    padding: 12px 2px; font-family: var(--grotesk); font-size: 17px; color: var(--fg);
    resize: none; transition: border-color 0.25s ease;
  }
  .field input::placeholder, .field textarea::placeholder { color: var(--muted-2); }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .form-send {
    display: inline-flex; align-items: center; justify-content: space-between;
    background: var(--accent); color: var(--accent-ink); border: none;
    padding: 18px 22px; cursor: pointer; width: max-content; min-width: 240px;
    font-family: var(--grotesk); font-size: 15px; font-weight: 600; letter-spacing: 0.02em;
    transition: padding 0.35s var(--ease);
  }
  .form-send .a { font-family: var(--mono); transition: transform 0.3s var(--ease); }
  .form-send:hover { padding-left: 30px; }
  .form-send:hover .a { transform: translateX(5px); }
  .form-sent { font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; color: var(--accent); padding-top: 6px; }

  /* FOOTER giant wordmark */
  .footer {
    position: relative;
    background: #0c0c0b; color: #fff;
    padding: clamp(50px, 6vw, 90px) clamp(30px, 5vw, 70px) 0;
    overflow-x: clip;
  }
  .footer-top { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 30px; padding-bottom: 50px; border-bottom: 1px solid rgba(255,255,255,0.14); }
  .footer-col h4 { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; color: rgba(255,255,255,0.4); margin-bottom: 16px; font-weight: 400; }
  .footer-col a, .footer-col p { display: block; color: rgba(255,255,255,0.82); text-decoration: none; font-size: 15px; margin-bottom: 9px; transition: color 0.2s ease; width: max-content; }
  .footer-col a:hover { color: #15c7f5; }
  .footer-wordmark {
    font-family: 'Hanken Grotesk', system-ui, sans-serif; font-weight: 700; text-transform: lowercase;
    font-size: clamp(46px, 14vw, 250px); line-height: 0.82; letter-spacing: -0.035em;
    text-align: left; color: #fff; white-space: nowrap; user-select: none;
    margin-top: clamp(20px, 3vw, 40px); margin-bottom: -0.08em;
  }
  .footer-wordmark .logo-accent { color: #fff; }
  .footer-wordmark { will-change: transform; }
  .footer-base { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 22px 0; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: rgba(255,255,255,0.4); }

  /* cursor labels */
  .cursor-words { position: fixed; inset: 0; z-index: 60; pointer-events: none; }
  .cw {
    position: absolute; transform: translate(-50%, -50%);
    background: #0a0a0a; color: #ffffff;
    font-family: var(--grotesk); font-weight: 600; font-size: 14px;
    letter-spacing: 0.01em; padding: 4px 11px; white-space: nowrap;
    animation: cwpop 0.95s var(--ease) forwards;
  }
  @keyframes cwpop {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(0.6); }
    18% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    72% { opacity: 1; transform: translate(-50%,-54%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-66%) scale(1); }
  }

  /* entrance animations */
  .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.8s var(--ease), transform 0.8s var(--ease); }
  .reveal.in { opacity: 1; transform: none; }
  .fade-in { opacity: 0; animation: fadeIn 0.7s ease forwards; }
  @keyframes fadeIn { to { opacity: 1; } }

  @media (max-width: 1100px) {
    .pfg { grid-template-columns: repeat(2, 1fr); --pf-h: clamp(280px, 42vw, 460px); }
  }
  @media (max-width: 820px) {
    .about-wrap, .contact-wrap { grid-template-columns: 1fr; }
    .lb-strip { justify-content: flex-start; }
  }
  @media (max-width: 560px) {
    .pfg { --pf-h: 52vw; gap: 7px; padding: 7px; }
    .floatnav { gap: 12px; --dock-x: 0px; top: 66px; }
    .hnav-item { font-size: 11px; letter-spacing: 0.06em; }
    .header { padding: 0 14px; }
    .hbrand { display: none; }
    .header-left { display: none; }
    .hsocial { display: none; }
  }

</style>
</head>
