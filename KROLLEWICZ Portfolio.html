// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>
  <script type="text/babel" data-presets="react">
/* =========================================================================
   PORTFOLIO — manifest-driven, auto-syncing grid + full-size lightbox
   Loads portfolio/manifest.json and POLLS it. When the server index gains
   a new project, its thumbnail animates in with a NEW badge + toast.
   Clicking any thumbnail opens the full-size lightbox gallery.
   ========================================================================= */
const { useState: pUseState, useEffect: pUseEffect, useRef: pUseRef, useCallback: pUseCallback } = React;

const PF_POLL_MS = 5000;

/* a demo project used only by the "simulate upload" tweak button, so the
   auto-detect animation can be previewed without editing files on a server */
const PF_DEMO = {
  id: "amelia_editorial",
  title: "Amelia — Editorial Cut",
  client: "AA Wings of Color",
  category: "PHOTO / EDITORIAL",
  year: "2025",
  ratio: "0.667",
  feature: false,
  cover: "portfolio/ciao_bella/thumbs/amelia_1925.jpg",
  images: [
    { thumb: "portfolio/ciao_bella/thumbs/amelia_1925.jpg", full: "portfolio/ciao_bella/full/amelia_1925.jpg" },
    { thumb: "portfolio/ciao_bella/thumbs/amelia_1184.jpg", full: "portfolio/ciao_bella/full/amelia_1184.jpg" },
    { thumb: "portfolio/ciao_bella/thumbs/amelia_525.jpg", full: "portfolio/ciao_bella/full/amelia_525.jpg" }
  ]
};

/* ---------------- inline manifest fallback (for file:// / offline) ----------------
   When the site is opened straight from disk (downloaded ZIP), browsers block
   fetch(), so we read the manifest embedded in the HTML as <script type=
   "application/json" id="portfolio-data">…<\/script>. Kept in sync by the build. */
function readInlineManifest() {
  try {
    const el = document.getElementById("portfolio-data");
    if (!el) return null;
    return JSON.parse(el.textContent || "{}");
  } catch (e) {
    return null;
  }
}

/* ---------------- auto-sync hook ---------------- */
function usePortfolioSync() {
  const [projects, setProjects] = pUseState([]);
  const [newIds, setNewIds] = pUseState([]);
  const [sync, setSync] = pUseState({ state: "idle", at: null, count: 0 });
  const known = pUseRef(new Set());
  const first = pUseRef(true);
  const injected = pUseRef([]); // client-side simulated projects

  const flagNew = pUseCallback((ids) => {
    if (!ids.length) return;
    setNewIds((cur) => [...new Set([...cur, ...ids])]);
    ids.forEach((id) =>
      setTimeout(() => setNewIds((cur) => cur.filter((x) => x !== id)), 14000)
    );
  }, []);

  const merge = pUseCallback((serverList) => {
    const list = [...serverList, ...injected.current];
    const fresh = list.filter((p) => !known.current.has(p.id));
    if (fresh.length && !first.current) flagNew(fresh.map((p) => p.id));
    list.forEach((p) => known.current.add(p.id));
    first.current = false;
    setProjects(list);
    return list.length;
  }, [flagNew]);

  const poll = pUseCallback(async () => {
    setSync((s) => ({ ...s, state: "checking" }));
    try {
      const res = await fetch("portfolio/manifest.json", { cache: "no-store" });
      if (!res.ok) throw new Error("no manifest");
      const data = await res.json();
      const count = merge(data.projects || []);
      setSync({ state: "ok", at: new Date(), count });
    } catch (e) {
      // fetch blocked (offline / opened from disk via file://) — fall back to the
      // manifest embedded inline in the HTML so the site still renders fully.
      const inline = readInlineManifest();
      if (inline && inline.projects && (known.current.size === 0)) {
        const count = merge(inline.projects);
        setSync({ state: "offline", at: new Date(), count });
      } else {
        setSync((s) => ({ ...s, state: "offline", at: new Date() }));
      }
    }
  }, [merge]);

  pUseEffect(() => {
    poll();
    const id = setInterval(poll, PF_POLL_MS);
    return () => clearInterval(id);
  }, [poll]);

  // simulate a new project landing on the server
  const simulate = pUseCallback(() => {
    if (known.current.has(PF_DEMO.id)) return false;
    injected.current = [...injected.current, PF_DEMO];
    merge(projects.filter((p) => !injected.current.includes(p)));
    setSync((s) => ({ ...s, state: "ok", at: new Date(), count: s.count + 1 }));
    return true;
  }, [merge, projects]);

  return { projects, newIds, sync, simulate, poll };
}

/* ---------------- sync status pill ---------------- */
function SyncPill({ sync, lang }) {
  const txt = {
    pl: { sync: "AUTO-SYNC", chk: "SPRAWDZAM…", off: "TRYB OFFLINE", proj: "PROJEKTY", upd: "ZAKTUALIZOWANO" },
    en: { sync: "AUTO-SYNC", chk: "CHECKING…", off: "OFFLINE MODE", proj: "PROJECTS", upd: "LAST SYNC" },
  }[lang];
  const time = sync.at
    ? sync.at.toLocaleTimeString(lang === "pl" ? "pl-PL" : "en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" })
    : "—";
  return (
    <div className={`sync-pill ${sync.state}`} title={txt.upd + " " + time}>
      <span className="sync-dot"></span>
      <span className="sync-label">{sync.state === "checking" ? txt.chk : sync.state === "offline" ? txt.off : txt.sync}</span>
      <span className="sync-sep"></span>
      <span className="sync-count">{String(sync.count).padStart(2, "0")} {txt.proj}</span>
      <span className="sync-time">{time}</span>
    </div>
  );
}

/* ---------------- card video cover: 5s muted loop ---------------- */
function CardVideo({ src }) {
  const ref = pUseRef(null);
  pUseEffect(() => {
    const v = ref.current;
    if (!v) return;
    const cap = () => { if (v.currentTime >= 5) v.currentTime = 0; };
    const play = () => { const p = v.play(); if (p && p.catch) p.catch(() => {}); };
    v.addEventListener("timeupdate", cap);
    if (v.readyState >= 2) play(); else v.addEventListener("loadeddata", play, { once: true });
    return () => v.removeEventListener("timeupdate", cap);
  }, [src]);
  return <video ref={ref} src={src} muted loop playsInline preload="metadata"></video>;
}

/* ---------------- project card ---------------- */
function pfPlural(n, forms) {
  // forms: [one, few, many]  e.g. ['klip','klipy','klipów']
  const m10 = n % 10, m100 = n % 100;
  if (n === 1) return forms[0];
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return forms[1];
  return forms[2];
}
function ProjectCard({ project, index, isNew, lang, onOpen }) {
  const imgN = project.images.length;
  const isVideo = project.coverType === "video";
  const label = lang === "pl"
    ? (isVideo ? pfPlural(imgN, ["klip", "klipy", "klipów"]) : pfPlural(imgN, ["obraz", "obrazy", "obrazów"]))
    : (isVideo ? (imgN === 1 ? "clip" : "clips") : (imgN === 1 ? "image" : "images"));
  const tags = (project.category || "").split("/").map((s) => s.trim()).filter(Boolean);
  return (
    <button
      className={`pfg-card ${project.wide ? "wide" : ""} ${isNew ? "is-new" : ""}`}
      style={{ "--i": index }}
      onClick={() => onOpen(project, 0)}
      aria-label={project.title}
    >
      <span className="pfg-media">
        {isVideo
          ? <CardVideo src={project.cover} />
          : <img src={project.cover} alt={project.title} loading="lazy" draggable="false" />}
      </span>
      <span className="pfg-ix mono">{String(index + 1).padStart(2, "0")}</span>
      <span className="pfg-tags">
        {tags.map((tg, i) => (<span key={i} className="pfg-tag mono">{tg}</span>))}
      </span>
      {isVideo && <span className="pfg-play" aria-hidden="true">▶</span>}
      {isNew && <span className="pfg-new mono">{lang === "pl" ? "NOWY" : "NEW"}</span>}
      <span className="pfg-grad"></span>
      <span className="pfg-foot">
        <span className="pfg-count mono">{imgN} {label}</span>
        <span className="pfg-arrow" aria-hidden="true">
          <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M8.5 19.5 19.5 8.5"></path>
            <path d="M10 8.5H19.5V18"></path>
          </svg>
        </span>
      </span>
    </button>
  );
}

/* ---------------- lightbox (full-size gallery) ---------------- */
function Lightbox({ project, index, setIndex, onClose, lang }) {
  const [zoom, setZoom] = pUseState(false);
  const total = project ? project.images.length : 0;

  pUseEffect(() => { setZoom(false); }, [index, project]);

  pUseEffect(() => {
    if (!project) return;
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      else if (e.key === "ArrowRight") setIndex((i) => (i + 1) % total);
      else if (e.key === "ArrowLeft") setIndex((i) => (i - 1 + total) % total);
    };
    window.addEventListener("keydown", onKey);
    document.documentElement.style.overflow = "hidden";
    return () => { window.removeEventListener("keydown", onKey); document.documentElement.style.overflow = ""; };
  }, [project, total, onClose, setIndex]);

  if (!project) return null;
  const img = project.images[index];
  const isVid = img.type === "video";
  return (
    <div className="lb" onClick={onClose}>
      <div className="lb-top" onClick={(e) => e.stopPropagation()}>
        <div className="lb-id">
          <span className="lb-cat mono">{project.category}</span>
          <span className="lb-title">{project.title}</span>
          <span className="lb-client mono">{project.client} · {project.year}</span>
        </div>
        <div className="lb-tools">
          <span className="lb-counter mono">{String(index + 1).padStart(2, "0")} / {String(total).padStart(2, "0")}</span>
          <button className="lb-x" onClick={onClose} aria-label="Close">✕</button>
        </div>
      </div>

      <div className="lb-stage" onClick={(e) => e.stopPropagation()}>
        <button className="lb-nav prev" onClick={() => setIndex((i) => (i - 1 + total) % total)} aria-label="Previous">‹</button>
        <div className={`lb-frame ${zoom && !isVid ? "zoom" : ""} ${isVid ? "is-video" : ""}`} onClick={() => { if (!isVid) setZoom((z) => !z); }}>
          {isVid
            ? <video key={img.full} src={img.full} controls autoPlay loop playsInline></video>
            : <img key={img.full} src={img.full} alt={project.title} draggable="false" />}
          {!isVid && <span className="lb-hint mono">{zoom ? (lang === "pl" ? "KLIKNIJ — DOPASUJ" : "CLICK — FIT") : (lang === "pl" ? "KLIKNIJ — POWIĘKSZ" : "CLICK — ZOOM")}</span>}
        </div>
        <button className="lb-nav next" onClick={() => setIndex((i) => (i + 1) % total)} aria-label="Next">›</button>
      </div>

      <div className="lb-strip" onClick={(e) => e.stopPropagation()}>
        {project.images.map((im, i) => (
          <button key={im.thumb} className={`lb-thumb ${i === index ? "on" : ""} ${im.type === "video" ? "vid" : ""}`} onClick={() => setIndex(i)}>
            {im.type === "video"
              ? <video src={im.thumb} muted playsInline preload="metadata"></video>
              : <img src={im.thumb} alt="" loading="lazy" draggable="false" />}
            {im.type === "video" && <span className="lb-thumb-play" aria-hidden="true">▶</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ---------------- closing CTA tile (always last) ---------------- */
function ProjectCTA({ lang, onClick }) {
  return (
    <button
      className="pfg-card pfg-cta"
      onClick={onClick}
      aria-label={lang === "pl" ? "Stwórzmy razem projekt" : "Let's create a project together"}
    >
      <span className="pfg-cta-kick mono">{lang === "pl" ? "WOLNY SLOT · 2026" : "OPEN SLOT · 2026"}</span>
      <span className="pfg-cta-h">{lang === "pl" ? "STWÓRZMY RAZEM PROJEKT" : "LET\u2019S CREATE SOMETHING TOGETHER"}</span>
      <span className="pfg-cta-foot">
        <span className="pfg-cta-sub mono">{lang === "pl" ? "TU MOŻE BYĆ TWÓJ PROJEKT" : "YOUR PROJECT COULD BE HERE"}</span>
        <span className="pfg-cta-arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.6">
            <path d="M7 17 L17 7"></path>
            <path d="M8 7 H17 V16"></path>
          </svg>
        </span>
      </span>
    </button>
  );
}

/* ---------------- portfolio section ---------------- */
function Portfolio({ t, lang, innerRef, sync, projects, newIds, onOpen, onContact }) {
  const gridRef = pUseRef(null);
  const [fillSpan, setFillSpan] = pUseState(0);

  // Light filler that occupies the empty trailing cells of the last row, so an
  // incomplete final row reads as light page background while the gaps between
  // actual tiles stay black (the frame). Recomputed on resize + project change.
  pUseEffect(() => {
    const grid = gridRef.current;
    if (!grid) return;
    const calc = () => {
      const cols = getComputedStyle(grid).gridTemplateColumns.split(/\s+/).filter(Boolean).length || 4;
      const cells = projects.reduce((a, p) => a + (p.wide ? 2 : 1), 0) + 1; // +1 = CTA tile
      setFillSpan((cols - (cells % cols)) % cols);
    };
    calc();
    window.addEventListener("resize", calc);
    return () => window.removeEventListener("resize", calc);
  }, [projects]);

  return (
    <section className="pf-block" id="portfolio" ref={innerRef}>
      <div className="pfg" data-count={projects.length} ref={gridRef}>
        {projects.map((p, i) => (
          <ProjectCard key={p.id} project={p} index={i} isNew={newIds.includes(p.id)} lang={lang} onOpen={onOpen} />
        ))}
        <ProjectCTA lang={lang} onClick={onContact} />
        {fillSpan > 0 && (
          <div className="pfg-fill" style={{ gridColumn: `span ${fillSpan}` }} aria-hidden="true"></div>
        )}
      </div>
    </section>
  );
}

Object.assign(window, { usePortfolioSync, Portfolio, Lightbox, SyncPill, ProjectCard, ProjectCTA });

  </script>

/* ---------------- live timecode ---------------- */
function useTimecode() {
  const [tc, setTc] = useState("00:00:00:00");
  useEffect(() => {
    let f = 0;
    const id = setInterval(() => {
      f = (f + 1) % (24 * 60 * 60 * 25);
      const fr = f % 25, s = Math.floor(f / 25) % 60, m = Math.floor(f / (25 * 60)) % 60, h = Math.floor(f / (25 * 3600)) % 24;
      const p = (n) => String(n).padStart(2, "0");
      setTc(`${p(h)}:${p(m)}:${p(s)}:${p(fr)}`);
    }, 40);
    return () => clearInterval(id);
  }, []);
  return tc;
}

/* ---------------- cursor word labels ---------------- */
function CursorWords() {
  const [labels, setLabels] = useState([]);
  const idRef = useRef(0);
  const lastRef = useRef({ x: 0, y: 0, t: 0 });
  useEffect(() => {
    const words = ["oj", "oh", "aj", "hi", "ej", "hej", "o!", "ha", "no!"];
    const onMove = (e) => {
      const now = performance.now();
      const dx = e.clientX - lastRef.current.x, dy = e.clientY - lastRef.current.y;
      const dist = Math.hypot(dx, dy);
      if (now - lastRef.current.t < 240 || dist < 45) return;
      lastRef.current = { x: e.clientX, y: e.clientY, t: now };
      if (Math.random() > 0.4) return;
      const id = ++idRef.current;
      const word = words[Math.floor(Math.random() * words.length)];
      const jx = (Math.random() - 0.5) * 34, jy = 16 + Math.random() * 16;
      setLabels((ls) => [...ls, { id, x: e.clientX - dx * 1.4 + jx, y: e.clientY - dy * 1.4 + jy, word }]);
      setTimeout(() => setLabels((ls) => ls.filter((l) => l.id !== id)), 950);
    };
    window.addEventListener("mousemove", onMove);
    return () => window.removeEventListener("mousemove", onMove);
  }, []);
  return (
    <div className="cursor-words" aria-hidden="true">
      {labels.map((l) => <span key={l.id} className="cw" style={{ left: l.x, top: l.y }}>{l.word}</span>)}
    </div>
  );
}

/* ---------------- home typewriter (appears above the wordmark after a beat) ---------------- */
function HomeType({ lang }) {
  const full = lang === "pl" ? "wierzysz, \u017ce to przypadek?" : "you think it's a coincidence?";
  const tail = " ;)";
  const seq = full + tail;
  const [shown, setShown] = useState("");
  const [run, setRun] = useState(0);   // play token — each increment retypes
  const [done, setDone] = useState(false);
  const armed = useRef(false);          // became true once user scrolled away

  // first run after a short beat on load
  useEffect(() => {
    const start = setTimeout(() => setRun((r) => r + 1), 2600);
    return () => clearTimeout(start);
  }, []);

  // replay when the user returns to the top after scrolling down the page
  useEffect(() => {
    const onScroll = () => {
      const vh = window.innerHeight;
      const y = window.scrollY;
      if (y > vh * 0.6) armed.current = true;
      if (y < vh * 0.12 && armed.current) {
        armed.current = false;
        setRun((r) => r + 1);
      }
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  // typing pass, re-keyed on `run`
  useEffect(() => {
    if (run === 0) return;
    setDone(false);
    setShown("");
    let i = 0, timer;
    const tick = () => {
      i++;
      setShown(seq.slice(0, i));
      if (i >= seq.length) { setDone(true); return; }
      let delay = 52 + Math.random() * 60;
      const justTyped = seq[i - 1];
      if (justTyped === "," || justTyped === "?") delay = 360; // breath at punctuation
      if (i === full.length) delay = 700;                       // pause before the wink
      timer = setTimeout(tick, delay);
    };
    timer = setTimeout(tick, 240);
    return () => clearTimeout(timer);
  }, [run]);
  return (
    <span className={`home-type ${run > 0 ? "on" : ""} ${done ? "done" : ""}`} aria-hidden="true">
      <span className="home-type-txt">{shown}</span>
      <span className="home-type-caret"></span>
    </span>
  );
}

  const [docked, setDocked] = useState(false);
  const t = COPY[lang];

  const { projects, newIds, sync, simulate } = usePortfolioSync();
  const [lb, setLb] = useState(null);
  const [lbIndex, setLbIndex] = useState(0);
  const [toast, setToast] = useState(null);
  const seenNew = useRef(new Set());

  const refs = [useRef(null), useRef(null), useRef(null), useRef(null), useRef(null)];

  const openLb = (project, idx) => { setLb(project); setLbIndex(idx || 0); };

  useEffect(() => {
    document.documentElement.style.setProperty("--accent", acc.v);
    document.documentElement.style.setProperty("--accent-ink", acc.ink);
    document.documentElement.lang = lang;
  }, [acc, lang]);

  /* surface a toast the first time a project id is flagged new */
  useEffect(() => {
    const fresh = newIds.find((id) => !seenNew.current.has(id));
    if (!fresh) return;
    seenNew.current.add(fresh);
    const p = projects.find((x) => x.id === fresh);
    const id = Date.now();
    setToast({ id, k: lang === "pl" ? "WYKRYTO NOWY PROJEKT" : "NEW PROJECT DETECTED", v: p ? p.title : fresh });
    const tm = setTimeout(() => setToast((cur) => (cur && cur.id === id ? null : cur)), 5200);
    return () => clearTimeout(tm);
  }, [newIds, projects, lang]);

  /* active-section highlight + scroll-driven fallback for older engines */
  useEffect(() => {
    const supportsST = window.CSS && CSS.supports && CSS.supports("animation-timeline: scroll()");
    let raf = 0;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = 0;
        const vh = window.innerHeight;
        const probe = vh * 0.42;
        let cur = 0;
        refs.forEach((r, i) => { if (r.current && r.current.getBoundingClientRect().top <= probe) cur = i; });
        setActive(cur);
        // nav snap threshold: dock once the portfolio is ~halfway into view
        const pf0 = refs[1].current;
        if (pf0) {
          const top0 = pf0.getBoundingClientRect().top;
          const dprog = (vh - top0) / (vh * 0.85);
          setDocked(dprog > 0.5);
        }
        // parallax: footer wordmark drifts right over the final stretch of the page
        const fw = document.querySelector(".footer-wordmark");
        const maxS = document.documentElement.scrollHeight - window.innerHeight;
        if (fw && maxS > 0) {
          const sp = window.scrollY / maxS;
          const fp = Math.max(0, Math.min(1, (sp - 0.74) / 0.26));
          fw.style.transform = `translateX(${(-9 + fp * 26).toFixed(2)}%)`;
        }
        // Always drive --dock / --hp from JS as a robust fallback. When the CSS
        // scroll/view timeline is active it overrides these inline values (the
        // animation wins the cascade); when the timeline can't resolve, JS keeps
        // the logo morph + plate reveal alive.
        {
          const y = window.scrollY;
          const pf = refs[1].current;
          let d = 0;
          if (pf) { const top = pf.getBoundingClientRect().top; d = Math.max(0, Math.min(1, (vh - top) / (vh * 0.85))); }
          // plate retraction is synced to the logo morph so the wordmark rides the
          // light plate down and settles onto the pinned top bar in the final phase
          document.documentElement.style.setProperty("--hp", d.toFixed(3));
          document.documentElement.style.setProperty("--dock", d.toFixed(3));
        }
      });
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll);
    return () => { window.removeEventListener("scroll", onScroll); window.removeEventListener("resize", onScroll); };
  }, []);

  /* reveal on scroll (non scroll-timeline elements) */
  useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((en) => { if (en.isIntersecting) { en.target.classList.add("in"); io.unobserve(en.target); } });
    }, { threshold: 0.14 });
    document.querySelectorAll(".reveal").forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, [lang, projects]);

  /* parallax on the home video */
  useEffect(() => {
    let raf = 0, last = null;
    const apply = () => {
      raf = 0; if (!last) return;
      const hero = refs[0].current;
      if (hero) {
        const r = hero.getBoundingClientRect();
        hero.style.setProperty("--px", ((last.clientX / window.innerWidth) - 0.5).toFixed(3));
        hero.style.setProperty("--py", (((last.clientY - r.top) / r.height) - 0.5).toFixed(3));
      }
    };
    const move = (e) => { last = e; if (!raf) raf = requestAnimationFrame(apply); };
    window.addEventListener("mousemove", move);
    return () => { window.removeEventListener("mousemove", move); cancelAnimationFrame(raf); };
  }, []);

  const go = (i) => {
    const el = refs[i].current;
    if (!el) return;
    const y = i === 0 ? 0 : window.scrollY + el.getBoundingClientRect().top - 66;
    window.scrollTo({ top: y, behavior: "smooth" });
  };

  return (
    <React.Fragment>
      <Header t={t} lang={lang} setLang={setLang} />
      <div className="home-mark" onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}>
        <span className="home-name">kro<span style={{ color: "var(--accent)" }}>l</span>lewicz</span>
        <span className="home-sub">marcin</span>
        <div className="home-tags" aria-hidden="true">
          <div className="home-tags-row">
            <span className="home-tag">art direction</span>
            <span className="home-tag">creative idea</span>
            <span className="home-tag">AI</span>
            <span className="home-tag">video</span>
            <span className="home-tag">photo</span>
          </div>
          <HomeType lang={lang} />
        </div>
      </div>
      <FloatNav t={t} active={active} go={go} docked={docked} />
      <Hero t={t} innerRef={refs[0]} />
      <div className="reveal-spacer"></div>
      <div className="curtain">
        <Portfolio t={t} lang={lang} innerRef={refs[1]} sync={sync} projects={projects} newIds={newIds} onOpen={openLb} onContact={() => go(4)} />
        <About t={t} innerRef={refs[2]} />
        <Services t={t} innerRef={refs[3]} />
        <Contact t={t} innerRef={refs[4]} />
        <Footer t={t} go={go} />
      </div>
      <div className="frame-border"></div>
      {tw.cursorWords && <CursorWords />}
      <Toast msg={toast} />
      <Lightbox project={lb} index={lbIndex} setIndex={setLbIndex} onClose={() => setLb(null)} lang={lang} />

      <TweaksPanel>
        <TweakSection label="Wygląd" />
        <TweakColor
          label="Akcent"
          value={acc.v}
          options={[ACCENTS.mono.v, ACCENTS.lime.v, ACCENTS.red.v, ACCENTS.blue.v]}
          onChange={(v) => {
            const key = Object.keys(ACCENTS).find((k) => ACCENTS[k].v === v) || "mono";
            setTweak("accent", key);
          }}
        />
        <TweakToggle label="Etykiety kursora" value={tw.cursorWords} onChange={(v) => setTweak("cursorWords", v)} />
        <TweakSection label="Portfolio / auto-sync" />
        <TweakButton label={lang === "pl" ? "Symuluj wgranie projektu" : "Simulate upload"} onClick={() => simulate()} />
      </TweaksPanel>
    </React.Fragment>
  );
}
