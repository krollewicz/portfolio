# Konfiguracja Netlify
# Przy każdym push do GitHuba Netlify uruchamia build, który przebudowuje
# portfolio/manifest.json (i generuje miniatury z nowych plików).

[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# Strona główna pod adresem "/" (plik ma spację w nazwie).
# Jeśli wolisz, zmień nazwę pliku na index.html i usuń ten redirect.
[[redirects]]
  from = "/"
  to = "/KROLLEWICZ Portfolio.html"
  status = 200
